services:
  frontend:
    build:
      context: ./frontend
      args:
        CACHEBUST: ${CACHEBUST:-1}
        APP_VERSION: ${APP_VERSION:-}
    restart: unless-stopped
    ports:
      - "${PORT:-7891}:80"
      - "${HTTPS_PORT:-7892}:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
